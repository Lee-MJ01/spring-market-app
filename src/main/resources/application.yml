logging:
  file:
    name: /home/ubuntu/shoply/logs/shoply.log # Ubuntu 경로로 수정
  level:
    root: info

mybatis:
  mapper-locations: classpath:mappers/**/*.xml

server:
  tomcat:
    uri-encoding: utf-8
  port: 8080
  servlet:
    context-path: /shoply

spring:
  application:
    name: shoply
    version: 1.0.0-RELEASE

  # 1. 구글 소셜 로그인 설정
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: profile, email
            # redirect-uri는 할당받은 탄력적 IP로 수정
            redirect-uri: http://18.207.20.187:8080/shoply/login/oauth2/code/google

  # 2. 데이터베이스 설정 (Docker Oracle XE)
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    url: jdbc:oracle:thin:@18.207.20.187:1521:xe

  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        format_sql: true
        show_sql: true

  # 3. 메일 발송 설정 (Gmail)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          timeout: 5000
          starttls:
            enable: true
          ssl:
            trust: smtp.gmail.com

  # 4. 파일 업로드 설정
  servlet:
    multipart:
      location: /home/ubuntu/shoply/uploads # 절대 경로 권장
      max-file-size: 10MB

  web:
    resources:
      static-locations: classpath:/static/, classpath:/public/, file:/home/ubuntu/shoply/uploads/

# 5. SMS 서비스 설정 (Solapi)
solapi:
  apiKey: ${SOLAPI_API_KEY}
  apiSecret: ${SOLAPI_API_SECRET}
  phoneNumber: ${SOLAPI_PHONE}