name: Java CI with Gradle
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # 1. application.yml의 변수를 GitHub Secrets 값으로 치환
      - name: Replace Secrets in application.yml
        uses: microsoft/variable-substitution@v1
        with:
          files: 'src/main/resources/application.yml'
        env:
          spring.security.oauth2.client.registration.google.client-id: ${{ secrets.GOOGLE_CLIENT_ID }}
          spring.security.oauth2.client.registration.google.client-secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          spring.datasource.username: ${{ secrets.DB_USERNAME }}
          spring.datasource.password: ${{ secrets.DB_PASSWORD }}
          spring.mail.username: ${{ secrets.MAIL_USERNAME }}
          spring.mail.password: ${{ secrets.MAIL_PASSWORD }}
          solapi.apiKey: ${{ secrets.SOLAPI_API_KEY }}
          solapi.apiSecret: ${{ secrets.SOLAPI_API_SECRET }}
          solapi.phoneNumber: ${{ secrets.SOLAPI_PHONE }}

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: temurin

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean bootJar -x test

      - name: Get JAR_FILE
        id: jarfile
        run: |
          JAR_FILE=$(ls build/libs/*.jar | grep -v plain | head -n 1)
          echo "JAR_FILE=${JAR_FILE}" >> $GITHUB_ENV

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: ${{ env.JAR_FILE }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app
          path: build/libs/

      - name: Setup SSH Key
        run: |
          echo "${{ secrets.AWS_EC2_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Copy JAR to EC2
        run: |
          JAR_FILE=$(ls build/libs/*.jar | head -n 1)
          scp -i private_key.pem \
            -o StrictHostKeyChecking=no \
            $JAR_FILE \
            ${{ secrets.AWS_EC2_USER }}@${{ secrets.AWS_EC2_HOST }}:/home/${{ secrets.AWS_EC2_USER }}/

      - name: Restart Spring Application on EC2
        run: |
          JAR_FILE=$(basename $(ls build/libs/*.jar | head -n 1))
          ssh -i private_key.pem \
            -o StrictHostKeyChecking=no \
            ${{ secrets.AWS_EC2_USER }}@${{ secrets.AWS_EC2_HOST }} << 'EOF'
            # 기존 실행 중인 자바 프로세스 종료
            CURRENT_PID=$(pgrep -f "java -jar")
            if [ -z "$CURRENT_PID" ]; then
              echo "No running application found."
            else
              echo "Killing process $CURRENT_PID"
              kill -9 $CURRENT_PID
              sleep 3
            fi

            # 애플리케이션 실행 (우리가 만든 로그 경로 활용)
            nohup java -jar /home/${{ secrets.AWS_EC2_USER }}/$JAR_FILE > /home/${{ secrets.AWS_EC2_USER }}/shoply/logs/app.log 2>&1 &
          EOF

      - name: Cleanup
        run: rm -f private_key.pem